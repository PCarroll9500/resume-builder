name: Generate Resume PDF

on:
  workflow_run:
    workflows: ["Build and deploy Nuxt site to Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  generate-pdf:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages deployment to propagate
        run: sleep 90

      - name: Generate PDF
        run: node scripts/generate-pdf.js

      - name: Commit PDF to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/Patrick_Carroll_Resume.pdf
          git diff --staged --quiet || git commit -m "Update Patrick_Carroll_Resume.pdf [skip ci]"
          git push

      - name: Trigger deploy to publish PDF to Pages
        run: gh workflow run deploy.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
